async function loadData(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}

async function saveData(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.error("Storage error:", e);
  }
}

// ─── GOOGLE SHEETS SYNC ───
async function syncToSheets(url, inventory, movements) {
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "sync_all", inventory, movements }),
  });
  if (!response.ok) throw new Error(`Sync failed: ${response.status}`);
  return await response.json();
}

async function loadFromSheets(url) {
  const [invRes, movRes] = await Promise.all([
    fetch(`${url}?action=load_inventory`),
    fetch(`${url}?action=load_movements`),
  ]);
  if (!invRes.ok || !movRes.ok) throw new Error("Failed to load from Google Sheets");
  const inventory = await invRes.json();
  const movements = await movRes.json();
  return { inventory, movements };
}

async function pingSheets(url) {
  const res = await fetch(`${url}?action=ping`);
  if (!res.ok) throw new Error("Connection failed");
  return await res.json();
}

// ─── AI EXTRACTION VIA ANTHROPIC API ───
const EXTRACTION_PROMPT = `You are an expert inventory data extraction assistant for a trading/distribution company based in Singapore that imports packaging products (cling film, stretch wrap, mailer bags, etc.) and other goods from suppliers across Asia.

YOUR JOB: Extract every line item from the uploaded commercial document into structured JSON. Focus on INVENTORY data only — ignore all pricing, costs, amounts, and monetary values.

DOCUMENT TYPES (most common first):
1. COMMERCIAL INVOICES — ISSUER = supplier, line items have description, quantity (ignore pricing columns)
2. PACKING LISTS — same shipment, line items have quantity, package count, N.W., G.W., measurement
3. COMBINED INVOICE + PACKING LIST (multi-page PDFs) — extract items once, merge data from both pages
4. PURCHASE ORDERS, QUOTATIONS, DELIVERY ORDERS, STOCK SHEETS — any doc with product line items

FIELD-BY-FIELD EXTRACTION RULES:

name: Clean, readable product name. Strip dimensions/specs out. 
  "CLING FILM 35CM*500M" → "Cling Film"
  "CLING FILM 45CM*600M BOX" → "Cling Film"
  "STRETCH WRAP 500MM" → "Stretch Wrap"
  "BIODEGRADABLE MAILER BAG 25x35CM" → "Biodegradable Mailer Bag"

specs: ALL dimensions, sizes, lengths, thicknesses combined with " x " separator. Lowercase units.
  "CLING FILM 35CM*500M" → "35cm x 500m"
  "CLING FILM 45CM*600M BOX" → "45cm x 600m (box pack)"
  "STRETCH WRAP 500MM 23MIC" → "500mm x 23mic"
  "38CM*500M" → "38cm x 500m"
  If the description ends with "BOX" it means the item is boxed variant — include "(box pack)" in specs.

sku: Product code / article number / part number if shown. Do NOT invent codes. Leave "" if none.

category: Best fit from ONLY: Electronics, Raw Materials, Packaging, Office Supplies, Food & Beverage, Chemicals, Components, Other

qty: Number only from QUANTITY column. "7098 Rolls" → 7098

unit: From quantity text, lowercase: roll, pcs, kg, box, pack, carton, set, pair, sheet, bag, bottle, can, drum, pallet, m, ft, g, L, mL, unit

supplier: The ISSUER / seller company (top of invoice). Just the company name, no address.
  "Youquan Food Packaging (Jiangsu) Co., Ltd" → "Youquan Food Packaging (Jiangsu) Co., Ltd"

dateReceived: Document date → YYYY-MM-DD. "6/Feb/26" → "2026-02-06". "2026.01.21" → "2026-01-21"

batchNo: Batch/lot number if present, else ""

expiry: Expiry date → YYYY-MM-DD if present, else ""

poNumber: INVOICE NO., PO NO., ORDER NO., REF NO. → e.g. "YQ20260121001"

location: Warehouse/storage if mentioned, else ""

notes: Include these if available:
  - N.W. and G.W. per line from packing list: "N.W.: 16403kg, G.W.: 19629kg"
  - Package count per line: "1183 ctns"
  - Measurement/volume: "51 Cbm"
  - Container/seal: "40HC CAIU7142164/FX44382330"
  - B/L number: "B/L: 177IASASS106611"
  - Shipment route: "Shanghai → Singapore"
  - Any special remarks (BOX variant, special packaging, etc.)
  - Do NOT include any pricing, costs, amounts, or monetary values in notes

confidence: 0.95+ if clearly readable, 0.7-0.9 if inferred, <0.7 if major fields missing

WORKED EXAMPLE — Given this commercial invoice data:
  ISSUER: Youquan Food Packaging (Jiangsu) Co., Ltd
  INVOICE NO: YQ20260121001, DATE: 6/Feb/26
  DESCRIPTION: CLING FILM 35CM*500M, QUANTITY: 7098 Rolls
  Packing list shows: 1183 ctns, N.W. 16403kg, G.W. 19629kg, 51 Cbm

Expected output for that line:
{
  "name": "Cling Film",
  "sku": "",
  "specs": "35cm x 500m",
  "category": "Packaging",
  "qty": 7098,
  "unit": "roll",
  "supplier": "Youquan Food Packaging (Jiangsu) Co., Ltd",
  "dateReceived": "2026-02-06",
  "batchNo": "",
  "expiry": "",
  "poNumber": "YQ20260121001",
  "location": "",
  "notes": "1183 ctns; N.W.: 16403kg, G.W.: 19629kg, 51 Cbm; Container: 40HC CAIU7142164/FX44382330; B/L: 177IASASS106611; Shanghai → Singapore",
  "confidence": 0.97
}

IMPORTANT:
- Each unique product line = one JSON object. Do NOT duplicate lines across invoice + packing list pages.
- If a multi-page PDF has both invoice and packing list for the same shipment, merge the data.
- Strip "N/M" marks from item names — these are shipping marks, not product names.
- Handle Chinese/bilingual documents — extract the English text or transliterate key fields.
- IGNORE all pricing, costs, amounts, currencies, and monetary values. Do NOT include them anywhere.

Respond with ONLY a raw JSON array. No markdown, no backticks, no explanation. Just [ ... ].
If no items found, respond with: []`;

async function extractWithAI(file, apiKey) {
  if (!apiKey) throw new Error("Anthropic API key is required. Go to Settings (bottom of sidebar) to add your key.");
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = () => reject(new Error("Failed to read file"));
    reader.readAsDataURL(file);
  });

  const ext = file.name.split(".").pop().toLowerCase();
  const isImage = ["png", "jpg", "jpeg", "gif", "webp"].includes(ext);
  const isPDF = ext === "pdf";
  const isText = ["csv", "tsv", "txt"].includes(ext);

  let content;
  const userMsg = "Extract all inventory line items from this document. Each unique product is one entry. Merge invoice + packing list data if both are present. Follow the extraction rules and worked example exactly. Return only the JSON array.";

  if (isImage) {
    const mimeMap = { png: "image/png", jpg: "image/jpeg", jpeg: "image/jpeg", gif: "image/gif", webp: "image/webp" };
    content = [
      { type: "image", source: { type: "base64", media_type: mimeMap[ext], data: base64 } },
      { type: "text", text: userMsg },
    ];
  } else if (isPDF) {
    content = [
      { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
      { type: "text", text: userMsg },
    ];
  } else if (isText) {
    const textContent = atob(base64);
    content = [
      { type: "text", text: userMsg + "\n\nDocument content:\n\n" + textContent },
    ];
  } else {
    const mimeMap = {
      xlsx: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
      xls: "application/vnd.ms-excel",
    };
    content = [
      { type: "document", source: { type: "base64", media_type: mimeMap[ext] || "application/octet-stream", data: base64 } },
      { type: "text", text: userMsg },
    ];
  }

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 8192,
      system: EXTRACTION_PROMPT,
      messages: [{ role: "user", content }],
    }),
  });

  if (!response.ok) {
    const errBody = await response.text();
    throw new Error(`API error ${response.status}: ${errBody}`);
  }

  const data = await response.json();
  const rawText = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).join("");
  // Robust JSON extraction: find the array in the response
  let cleaned = rawText.replace(/```json|```/g, "").trim();
  const arrStart = cleaned.indexOf("[");
  const arrEnd = cleaned.lastIndexOf("]");
  if (arrStart === -1 || arrEnd === -1) throw new Error("AI response did not contain a JSON array");
  cleaned = cleaned.substring(arrStart, arrEnd + 1);

  const items = JSON.parse(cleaned);
  if (!Array.isArray(items)) throw new Error("AI did not return an array");

  const VALID_CATEGORIES = ["Electronics", "Raw Materials", "Packaging", "Office Supplies", "Food & Beverage", "Chemicals", "Components", "Other"];
  const VALID_UNITS = ["pcs", "kg", "g", "L", "mL", "box", "roll", "pack", "m", "ft", "unit", "carton", "set", "pair", "sheet", "bag", "bottle", "can", "drum", "pallet"];

  return items.map((item) => ({
    name: String(item.name || "").trim(),
    sku: String(item.sku || "").trim(),
    specs: String(item.specs || "").trim(),
    category: VALID_CATEGORIES.includes(item.category) ? item.category : "Other",
    qty: Math.max(0, Number(item.qty) || 0),
    unit: VALID_UNITS.includes(String(item.unit || "").toLowerCase()) ? String(item.unit).toLowerCase() : "pcs",
    supplier: String(item.supplier || "").trim(),
    dateReceived: String(item.dateReceived || "").trim(),
    batchNo: String(item.batchNo || "").trim(),
    expiry: String(item.expiry || "").trim(),
    poNumber: String(item.poNumber || "").trim(),
    location: String(item.location || "").trim(),
    notes: String(item.notes || "").trim(),
    confidence: Math.min(1, Math.max(0, Number(item.confidence) || 0.5)),
  }));
}

function InventoryApp() {
  const [page, setPage] = useState("dashboard");
  const [inventory, setInventory] = useState([]);
  const [movements, setMovements] = useState([]);
  const [nextId, setNextId] = useState(100);
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);
  const [sheetsUrl, setSheetsUrl] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [sheetsStatus, setSheetsStatus] = useState(""); // "" | "connected" | "error"

  // Load from storage on mount
  useEffect(() => {
    (async () => {
      const items = await loadData(STORAGE_KEYS.inventory, null);
      const movs = await loadData(STORAGE_KEYS.movements, null);
      const nid = await loadData(STORAGE_KEYS.nextId, 100);
      const url = await loadData(STORAGE_KEYS.sheetsUrl, "");
      const key = await loadData(STORAGE_KEYS.apiKey, "");
      setInventory(items || SEED_ITEMS);
      setMovements(movs || SEED_MOVEMENTS);
      setNextId(nid);
      setSheetsUrl(url || "");
      setApiKey(key || "");
      setLoaded(true);
    })();
  }, []);

  // Persist on changes
  useEffect(() => {
    if (!loaded) return;
    saveData(STORAGE_KEYS.inventory, inventory);
  }, [inventory, loaded]);
  useEffect(() => {
    if (!loaded) return;
    saveData(STORAGE_KEYS.movements, movements);
  }, [movements, loaded]);
  useEffect(() => {
    if (!loaded) return;
    saveData(STORAGE_KEYS.nextId, nextId);
  }, [nextId, loaded]);

  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  // Google Sheets sync
  const saveSheetsUrl = useCallback(async (url) => {
    setSheetsUrl(url);
    await saveData(STORAGE_KEYS.sheetsUrl, url);
    if (url) {
      try {
        await pingSheets(url);
        setSheetsStatus("connected");
        showToast("Google Sheets connected");
      } catch {
        setSheetsStatus("error");
        showToast("Could not connect to Google Sheets", "red");
      }
    } else {
      setSheetsStatus("");
    }
  }, [showToast]);

  const handleSyncToSheets = useCallback(async () => {
    if (!sheetsUrl) { setShowSettings(true); return; }
    setSyncing(true);
    try {
      await syncToSheets(sheetsUrl, inventory, movements);
      showToast("Synced to Google Sheets");
    } catch (err) {
      showToast("Sync failed: " + err.message, "red");
    }
    setSyncing(false);
  }, [sheetsUrl, inventory, movements, showToast]);

  const handleLoadFromSheets = useCallback(async () => {
    if (!sheetsUrl) { setShowSettings(true); return; }
    setSyncing(true);
    try {
      const data = await loadFromSheets(sheetsUrl);
      if (data.inventory && data.inventory.length > 0) {
        setInventory(data.inventory);
        const maxId = Math.max(...data.inventory.map(i => Number(i.id) || 0), nextId);
        setNextId(maxId + 1);
      }
      if (data.movements && data.movements.length > 0) {
        setMovements(data.movements);
      }
      showToast(`Loaded ${data.inventory?.length || 0} items from Google Sheets`);
    } catch (err) {
      showToast("Load failed: " + err.message, "red");
    }
    setSyncing(false);
  }, [sheetsUrl, nextId, showToast]);

  const addItems = useCallback((items) => {
    let id = nextId;
    let mergedCount = 0;
    let newCount = 0;

    setInventory((prev) => {
      const updated = [...prev];
      items.forEach((item) => {
        // Match by SKU (if both have SKU) + specs + unit must match, OR by name + specs + unit
        const existingIdx = updated.findIndex((inv) => {
          const specsMatch = (inv.specs || "").toLowerCase() === (item.specs || "").toLowerCase();
          const unitMatch = (inv.unit || "").toLowerCase() === (item.unit || "").toLowerCase();
          // SKU match: both must have SKU, and specs + unit must also match
          if (item.sku && inv.sku && item.sku.toLowerCase() === inv.sku.toLowerCase() && specsMatch && unitMatch) return true;
          // Name match: exact name + specs + unit must all match
          if (item.name && inv.name && item.name.toLowerCase() === inv.name.toLowerCase() && specsMatch && unitMatch) return true;
          return false;
        });

        if (existingIdx !== -1) {
          // Merge: add quantity, update fields that were empty
          const existing = updated[existingIdx];
          updated[existingIdx] = {
            ...existing,
            qty: existing.qty + Number(item.qty),
            specs: existing.specs || item.specs || "",
            supplier: existing.supplier || item.supplier || "",
            location: existing.location || item.location || "",
            batchNo: item.batchNo || existing.batchNo || "",
            expiry: item.expiry || existing.expiry || "",
            notes: item.notes && existing.notes ? `${existing.notes}; ${item.notes}` : item.notes || existing.notes || "",
          };
          mergedCount++;
        } else {
          // New item
          updated.push({ ...item, id: id++ });
          newCount++;
        }
      });
      return updated;
    });

    setNextId(id);
    const now = new Date().toISOString().split("T")[0];
    const newMovs = items.map((item, i) => ({
      id: Date.now() + i,
      type: "in",
      itemName: item.name,
      sku: item.sku,
      qty: item.qty,
      date: item.dateReceived || now,
      ref: item.poNumber || "",
      party: item.supplier || "",
      notes: item.notes || "",
    }));
    setMovements((prev) => [...newMovs, ...prev]);

    const parts = [];
    if (mergedCount > 0) parts.push(`${mergedCount} merged into existing`);
    if (newCount > 0) parts.push(`${newCount} new item${newCount > 1 ? "s" : ""} added`);
    showToast(parts.join(", ") || `${items.length} item(s) processed`);
  }, [nextId, showToast]);

  const processStockOut = useCallback((outItems) => {
    // Validate stock availability first
    const errors = [];
    outItems.forEach(({ itemId, qty, itemName }) => {
      const inv = inventory.find((i) => i.id === itemId);
      if (inv && qty > inv.qty) {
        errors.push({ itemName: itemName || inv.name, requested: qty, available: inv.qty, unit: inv.unit });
      }
    });

    if (errors.length > 0) {
      return { success: false, errors };
    }

    setInventory((prev) => {
      const updated = [...prev];
      outItems.forEach(({ itemId, qty }) => {
        const idx = updated.findIndex((i) => i.id === itemId);
        if (idx !== -1) updated[idx] = { ...updated[idx], qty: updated[idx].qty - qty };
      });
      return updated;
    });
    const now = new Date().toISOString().split("T")[0];
    const newMovs = outItems.map((o, i) => ({
      id: Date.now() + i,
      type: "out",
      itemName: o.itemName,
      sku: o.sku,
      qty: o.qty,
      date: now,
      ref: o.ref || "",
      party: o.party || "",
      notes: o.notes || "",
    }));
    setMovements((prev) => [...newMovs, ...prev]);
    showToast(`${outItems.length} item(s) dispatched`);
    return { success: true, errors: [] };
  }, [inventory, showToast]);

  const deleteItem = useCallback((id) => {
    setInventory((prev) => prev.filter((i) => i.id !== id));
    showToast("Item deleted", "red");
  }, [showToast]);

  const updateItem = useCallback((id, updates) => {
    setInventory((prev) => prev.map((i) => (i.id === id ? { ...i, ...updates } : i)));
    showToast("Item updated");
  }, [showToast]);

  const lowStockItems = inventory.filter((i) => i.qty <= LOW_STOCK_THRESHOLD);
  const totalItems = inventory.reduce((s, i) => s + i.qty, 0);

  const pages = {
    dashboard: <DashboardPage inventory={inventory} movements={movements} lowStockItems={lowStockItems} totalItems={totalItems} setPage={setPage} />,
    inventory: <InventoryPage inventory={inventory} deleteItem={deleteItem} updateItem={updateItem} />,
    stockin: <StockInPage addItems={addItems} apiKey={apiKey} setShowSettings={setShowSettings} />,
    stockout: <StockOutPage inventory={inventory} processStockOut={processStockOut} />,
    history: <HistoryPage movements={movements} />,
  };

  if (!loaded) return <div style={{ background: PALETTE.bg, height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: PALETTE.textMuted, fontFamily: "'DM Sans', sans-serif" }}>Loading…</div>;

  return (
    <>
      <link href={FONT_LINK} rel="stylesheet" />
      <div style={{ background: PALETTE.bg, minHeight: "100vh", fontFamily: "'DM Sans', sans-serif", color: PALETTE.text, display: "flex" }}>
        {/* SIDEBAR */}
        <aside style={{ width: 220, background: PALETTE.surface, borderRight: `1px solid ${PALETTE.border}`, display: "flex", flexDirection: "column", position: "fixed", top: 0, left: 0, bottom: 0, zIndex: 50 }}>
          <div style={{ padding: "24px 20px 20px", borderBottom: `1px solid ${PALETTE.border}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 28, height: 28, borderRadius: 6, background: `linear-gradient(135deg, ${PALETTE.accent}, ${PALETTE.purple})`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icons.Inventory />
              </div>
              <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: "-0.02em" }}>StockPilot</span>
            </div>
            <div style={{ fontSize: 11, color: PALETTE.textDim, marginTop: 4, fontFamily: "'JetBrains Mono', monospace" }}>AI-Powered Inventory</div>
          </div>
          <nav style={{ flex: 1, padding: "12px 8px" }}>
            {[
              { key: "dashboard", label: "Dashboard", icon: <Icons.Dashboard /> },
              { key: "inventory", label: "Inventory", icon: <Icons.Inventory /> },
              { key: "stockin", label: "Stock In", icon: <Icons.StockIn /> },
              { key: "stockout", label: "Stock Out", icon: <Icons.StockOut /> },
              { key: "history", label: "History", icon: <Icons.History /> },
            ].map((item) => (
              <button
                key={item.key}
                onClick={() => setPage(item.key)}
                style={{
                  display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 12px", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: page === item.key ? 600 : 400, fontFamily: "inherit",
                  background: page === item.key ? PALETTE.accentSoft : "transparent",
                  color: page === item.key ? PALETTE.accent : PALETTE.textMuted,
                  transition: "all 0.15s",
                  marginBottom: 2,
                }}
              >
                {item.icon}
                {item.label}
              </button>
            ))}
          </nav>
          {lowStockItems.length > 0 && (
            <div style={{ margin: "0 12px 8px", padding: "10px 12px", background: PALETTE.amberSoft, border: `1px solid ${PALETTE.amberBorder}`, borderRadius: 8, fontSize: 11, color: PALETTE.amber, display: "flex", alignItems: "center", gap: 6 }}>
              <Icons.Alert />
              {lowStockItems.length} low stock item{lowStockItems.length > 1 ? "s" : ""}
            </div>
          )}
          {/* GOOGLE SHEETS SYNC */}
          <div style={{ padding: "0 8px 12px", borderTop: `1px solid ${PALETTE.border}`, paddingTop: 12 }}>
            <button onClick={handleSyncToSheets} disabled={syncing}
              style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "8px 12px", border: "none", borderRadius: 8, cursor: syncing ? "not-allowed" : "pointer", fontSize: 12, fontWeight: 500, fontFamily: "inherit", background: sheetsUrl ? PALETTE.greenSoft : PALETTE.surfaceHover, color: sheetsUrl ? PALETTE.green : PALETTE.textDim, marginBottom: 4, transition: "all 0.15s", opacity: syncing ? 0.6 : 1 }}>
              <Icons.Sync /> {syncing ? "Syncing…" : "Sync to Sheets"}
            </button>
            <button onClick={handleLoadFromSheets} disabled={syncing}
              style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "8px 12px", border: "none", borderRadius: 8, cursor: syncing ? "not-allowed" : "pointer", fontSize: 12, fontWeight: 500, fontFamily: "inherit", background: "transparent", color: PALETTE.textDim, marginBottom: 4, transition: "all 0.15s", opacity: syncing ? 0.6 : 1 }}>
              <Icons.StockIn /> Load from Sheets
            </button>
            <button onClick={() => setShowSettings(true)}
              style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "8px 12px", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: 400, fontFamily: "inherit", background: "transparent", color: PALETTE.textDim, transition: "all 0.15s" }}>
              <Icons.Settings />
              {sheetsUrl ? (sheetsStatus === "connected" ? "Sheets connected ✓" : "Sheets settings") : "Connect Google Sheets"}
            </button>
          </div>
        </aside>

        {/* MAIN CONTENT */}
        <main style={{ flex: 1, marginLeft: 220, padding: "28px 32px", maxWidth: 1100 }}>
          {pages[page]}
        </main>

        {/* SETTINGS MODAL */}
        {showSettings && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
            <Card style={{ width: 540, maxHeight: "85vh", overflow: "auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600 }}>Settings</h3>
                <button onClick={() => setShowSettings(false)} style={{ background: "none", border: "none", color: PALETTE.textMuted, cursor: "pointer" }}><Icons.Close /></button>
              </div>

              {/* API KEY SECTION */}
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}><Icons.Sparkle /> AI Extraction (Anthropic API)</div>
                <p style={{ fontSize: 12, color: PALETTE.textMuted, margin: "0 0 10px", lineHeight: 1.5 }}>
                  Required for AI-powered document extraction. Get your key from <span style={{ color: PALETTE.accent }}>console.anthropic.com</span>
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 11, fontWeight: 500, color: PALETTE.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>Anthropic API Key</label>
                  <input
                    type="password"
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                    placeholder="sk-ant-api03-..."
                    style={{ background: PALETTE.bg, border: `1px solid ${PALETTE.border}`, borderRadius: 8, padding: "10px 12px", color: PALETTE.text, fontSize: 12, outline: "none", fontFamily: "'JetBrains Mono', monospace", width: "100%" }}
                  />
                </div>
                {apiKey && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", background: PALETTE.greenSoft, borderRadius: 6, fontSize: 11, color: PALETTE.green, marginTop: 8 }}>
                    <Icons.Check /> API key saved
                  </div>
                )}
              </div>

              <div style={{ height: 1, background: PALETTE.border, margin: "0 0 20px" }} />

              {/* GOOGLE SHEETS SECTION */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}><Icons.Sync /> Google Sheets Sync</div>
                <p style={{ fontSize: 12, color: PALETTE.textMuted, margin: "0 0 10px", lineHeight: 1.5 }}>
                  Connect to a Google Sheet for backup and team sharing.
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 10 }}>
                  <label style={{ fontSize: 11, fontWeight: 500, color: PALETTE.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>Apps Script Web App URL</label>
                  <input
                    value={sheetsUrl}
                    onChange={(e) => setSheetsUrl(e.target.value)}
                    placeholder="https://script.google.com/macros/s/xxxxx/exec"
                    style={{ background: PALETTE.bg, border: `1px solid ${PALETTE.border}`, borderRadius: 8, padding: "10px 12px", color: PALETTE.text, fontSize: 12, outline: "none", fontFamily: "'JetBrains Mono', monospace", width: "100%" }}
                  />
                </div>
                {sheetsStatus === "connected" && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", background: PALETTE.greenSoft, borderRadius: 6, fontSize: 11, color: PALETTE.green, marginBottom: 8 }}>
                    <Icons.Check /> Connected to Google Sheets
                  </div>
                )}
                {sheetsStatus === "error" && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", background: PALETTE.redSoft, borderRadius: 6, fontSize: 11, color: PALETTE.red, marginBottom: 8 }}>
                    <Icons.Alert /> Connection failed — check your URL
                  </div>
                )}
              </div>

              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                <Btn variant="secondary" onClick={() => setShowSettings(false)}>Cancel</Btn>
                <Btn onClick={() => { saveData(STORAGE_KEYS.apiKey, apiKey); saveSheetsUrl(sheetsUrl); setShowSettings(false); }}>
                  <Icons.Check /> Save Settings
                </Btn>
              </div>
            </Card>
          </div>
        )}

        {/* TOAST */}
        {toast && (
          <div style={{
            position: "fixed", bottom: 24, right: 24, padding: "12px 20px", borderRadius: 10, fontSize: 13, fontWeight: 500, fontFamily: "'DM Sans', sans-serif", zIndex: 999,
            background: toast.type === "red" ? PALETTE.redSoft : PALETTE.greenSoft,
            color: toast.type === "red" ? PALETTE.red : PALETTE.green,
            border: `1px solid ${toast.type === "red" ? PALETTE.redBorder : PALETTE.greenBorder}`,
            animation: "fadeIn 0.2s ease",
          }}>
            {toast.msg}
          </div>
        )}
        <style>{`
          @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
          @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
          input, select, textarea { font-family: 'DM Sans', sans-serif; }
          ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: ${PALETTE.border}; border-radius: 3px; }
          * { box-sizing: border-box; }
        `}</style>
      </div>
    </>
  );
}

// ─── SHARED COMPONENTS ───
function Card({ children, style }) {
  return <div style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}`, borderRadius: 12, padding: 20, ...style }}>{children}</div>;
}

function Badge({ children, color = "blue", style }) {
  const colors = {
    blue: { bg: PALETTE.accentSoft, text: PALETTE.accent, border: "rgba(59,130,246,0.25)" },
    green: { bg: PALETTE.greenSoft, text: PALETTE.green, border: PALETTE.greenBorder },
    red: { bg: PALETTE.redSoft, text: PALETTE.red, border: PALETTE.redBorder },
    amber: { bg: PALETTE.amberSoft, text: PALETTE.amber, border: PALETTE.amberBorder },
    purple: { bg: PALETTE.purpleSoft, text: PALETTE.purple, border: "rgba(168,85,247,0.25)" },
    muted: { bg: "rgba(122,139,160,0.1)", text: PALETTE.textMuted, border: "rgba(122,139,160,0.2)" },
  };
  const c = colors[color] || colors.blue;
  return <span style={{ display: "inline-flex", alignItems: "center", padding: "3px 8px", borderRadius: 6, fontSize: 11, fontWeight: 600, background: c.bg, color: c.text, border: `1px solid ${c.border}`, fontFamily: "'JetBrains Mono', monospace", ...style }}>{children}</span>;
}

function Btn({ children, onClick, variant = "primary", style, disabled }) {
  const variants = {
    primary: { background: PALETTE.accent, color: "#fff", border: "none" },
    secondary: { background: "transparent", color: PALETTE.textMuted, border: `1px solid ${PALETTE.border}` },
    danger: { background: PALETTE.redSoft, color: PALETTE.red, border: `1px solid ${PALETTE.redBorder}` },
    green: { background: PALETTE.greenSoft, color: PALETTE.green, border: `1px solid ${PALETTE.greenBorder}` },
  };
  const v = variants[variant];
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{ ...v, padding: "8px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", fontFamily: "inherit", display: "inline-flex", alignItems: "center", gap: 6, transition: "all 0.15s", opacity: disabled ? 0.5 : 1, ...style }}
    >
      {children}
    </button>
  );
}

function Input({ label, value, onChange, type = "text", placeholder, style, small, mono }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, ...style }}>
      {label && <label style={{ fontSize: 11, fontWeight: 500, color: PALETTE.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</label>}
      <input
        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        style={{ background: PALETTE.bg, border: `1px solid ${PALETTE.border}`, borderRadius: 8, padding: small ? "6px 10px" : "8px 12px", color: PALETTE.text, fontSize: small ? 12 : 13, outline: "none", fontFamily: mono ? "'JetBrains Mono', monospace" : "inherit", width: "100%" }}
      />
    </div>
  );
}

function Select({ label, value, onChange, options, style, small }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, ...style }}>
      {label && <label style={{ fontSize: 11, fontWeight: 500, color: PALETTE.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</label>}
      <select
        value={value}
        onChange={(e) => onChange(e.target.value)}
        style={{ background: PALETTE.bg, border: `1px solid ${PALETTE.border}`, borderRadius: 8, padding: small ? "6px 10px" : "8px 12px", color: PALETTE.text, fontSize: small ? 12 : 13, outline: "none", fontFamily: "inherit", cursor: "pointer", width: "100%" }}
      >
        {options.map((o) => (
          <option key={typeof o === "string" ? o : o.value} value={typeof o === "string" ? o : o.value}>
            {typeof o === "string" ? o : o.label}
          </option>
        ))}
      </select>
    </div>
  );
}

function PageHeader({ title, subtitle, children }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
      <div>
        <h1 style={{ fontSize: 22, fontWeight: 700, margin: 0, letterSpacing: "-0.02em" }}>{title}</h1>
        {subtitle && <p style={{ fontSize: 13, color: PALETTE.textMuted, margin: "4px 0 0" }}>{subtitle}</p>}
      </div>
      <div style={{ display: "flex", gap: 8 }}>{children}</div>
    </div>
  );
}

// ─── DASHBOARD PAGE ───
function DashboardPage({ inventory, movements, lowStockItems, totalItems, setPage }) {
  const recentIn = movements.filter((m) => m.type === "in").slice(0, 5);
  const recentOut = movements.filter((m) => m.type === "out").slice(0, 5);
  const categories = {};
  inventory.forEach((i) => { categories[i.category] = (categories[i.category] || 0) + i.qty; });

  return (
    <div>
      <PageHeader title="Dashboard" subtitle="Real-time inventory overview" />

      {/* METRIC CARDS */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total SKUs", value: inventory.length, color: PALETTE.accent },
          { label: "Total Units", value: totalItems.toLocaleString(), color: PALETTE.green },
          { label: "Low Stock Alerts", value: lowStockItems.length, color: lowStockItems.length > 0 ? PALETTE.amber : PALETTE.green },
        ].map((m, i) => (
          <Card key={i}>

      {/* RECENT MOVEMENTS */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>

            <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${PALETTE.border}`, fontSize: 12 }}>

              <span style={{ color: PALETTE.green, fontFamily: "'JetBrains Mono', monospace" }}>+{m.qty}</span>

        </Card>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 600, display: "flex", alignItems: "center", gap: 6, color: PALETTE.red }}><Icons.StockOut /> Recent Stock Out</div>

          ))}

      </div>
    </div>
  );
}

// ─── INVENTORY PAGE ───
// ─── GROUPED INVENTORY ROWS ───
function GroupedInventoryRows({ filtered, startEdit, setDeletingItem }) {
  const [expanded, setExpanded] = useState({});

  // Group items by normalized name
  const groups = [];
  const groupMap = {};
  filtered.forEach((item) => {
    const key = item.name.toLowerCase().trim();
    if (!groupMap[key]) {
      groupMap[key] = { name: item.name, items: [] };
      groups.push(groupMap[key]);
    }
    groupMap[key].items.push(item);
  });

  const toggleGroup = (name) => {
    setExpanded((prev) => ({ ...prev, [name]: !prev[name] }));
  };

  return groups.map((group) => {
    const key = group.name.toLowerCase().trim();
    const isMulti = group.items.length > 1;
    const isOpen = expanded[key];
    const totalQty = group.items.reduce((s, i) => s + i.qty, 0);
    const anyLow = group.items.some((i) => i.qty <= LOW_STOCK_THRESHOLD);

    if (!isMulti) {
      // Single item — render flat row as before
      const item = group.items[0];
      const isLow = item.qty <= LOW_STOCK_THRESHOLD;
      return (
        <tr key={item.id} style={{ borderBottom: `1px solid ${PALETTE.border}`, transition: "background 0.1s" }} onMouseEnter={(e) => e.currentTarget.style.background = PALETTE.surfaceHover} onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
          <td style={{ padding: "10px 14px", fontWeight: 500 }}>{item.name}</td>
          <td style={{ padding: "10px 14px" }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", color: "#fff", fontSize: 11, fontWeight: 500 }}>{item.sku || "—"}</div>
            {item.specs && <div style={{ fontSize: 10, color: "#fff", marginTop: 2, fontWeight: 500 }}>{item.specs}</div>}
          </td>
          <td style={{ padding: "10px 14px" }}><Badge color="muted">{item.category}</Badge></td>
          <td style={{ padding: "10px 14px" }}>
            <Badge color={isLow ? (item.qty === 0 ? "red" : "amber") : "green"}>{item.qty}</Badge>
          </td>
          <td style={{ padding: "10px 14px", color: PALETTE.textMuted }}>{item.unit}</td>
          <td style={{ padding: "10px 14px", fontFamily: "'JetBrains Mono', monospace", color: PALETTE.textDim, fontSize: 11 }}>{item.location || "—"}</td>
          <td style={{ padding: "10px 14px", color: PALETTE.textMuted, fontSize: 11 }}>{item.supplier || "—"}</td>
          <td style={{ padding: "10px 14px", whiteSpace: "nowrap" }}>
            <button onClick={() => startEdit(item)} style={{ background: "none", border: "none", color: PALETTE.textDim, cursor: "pointer", padding: 4, marginRight: 4 }}><Icons.Edit /></button>
            <button onClick={() => setDeletingItem(item)} style={{ background: "none", border: "none", color: PALETTE.textDim, cursor: "pointer", padding: 4 }}><Icons.Trash /></button>
          </td>
        </tr>
      );
    }

    // Multi-variant group — parent row + expandable children
    const rows = [];

    // Parent row
    rows.push(
      <tr
        key={`group-${key}`}
        onClick={() => toggleGroup(key)}
        style={{ borderBottom: `1px solid ${PALETTE.border}`, cursor: "pointer", transition: "background 0.1s", background: isOpen ? PALETTE.surfaceHover : "transparent" }}
        onMouseEnter={(e) => { if (!isOpen) e.currentTarget.style.background = PALETTE.surfaceHover; }}
        onMouseLeave={(e) => { if (!isOpen) e.currentTarget.style.background = "transparent"; }}
      >
        <td style={{ padding: "10px 14px", fontWeight: 600 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ display: "inline-flex", transition: "transform 0.2s", transform: isOpen ? "rotate(0deg)" : "rotate(-90deg)", color: PALETTE.accent }}><Icons.ChevDown /></span>
            {group.name}
            <span style={{ fontSize: 10, color: PALETTE.accent, fontWeight: 700, background: PALETTE.accentSoft, padding: "1px 6px", borderRadius: 4 }}>{group.items.length} variants</span>
          </div>
        </td>
        <td style={{ padding: "10px 14px", color: PALETTE.textDim, fontSize: 11 }}>
          {group.items.map((i) => i.specs || i.sku).filter(Boolean).slice(0, 2).join(", ")}
          {group.items.length > 2 && " …"}
        </td>
        <td style={{ padding: "10px 14px" }}><Badge color="muted">{group.items[0].category}</Badge></td>
        <td style={{ padding: "10px 14px" }}>
          <Badge color={anyLow ? "amber" : "green"}>{totalQty}</Badge>
        </td>
        <td style={{ padding: "10px 14px", color: PALETTE.textDim, fontSize: 11 }}>mixed</td>
        <td style={{ padding: "10px 14px" }} />
        <td style={{ padding: "10px 14px", color: PALETTE.textMuted, fontSize: 11 }}>{group.items[0].supplier || "—"}</td>
        <td style={{ padding: "10px 14px" }} />
      </tr>
    );

    // Child rows (expanded)
    if (isOpen) {
      group.items.forEach((item) => {
        const isLow = item.qty <= LOW_STOCK_THRESHOLD;
        rows.push(
          <tr key={item.id} style={{ borderBottom: `1px solid ${PALETTE.border}`, background: "rgba(59,130,246,0.04)", transition: "background 0.1s" }} onMouseEnter={(e) => e.currentTarget.style.background = "rgba(59,130,246,0.08)"} onMouseLeave={(e) => e.currentTarget.style.background = "rgba(59,130,246,0.04)"}>
            <td style={{ padding: "10px 14px 10px 42px", color: PALETTE.textMuted, fontSize: 12 }}>
              <span style={{ color: PALETTE.textDim, marginRight: 6 }}>↳</span>
              {item.specs || item.sku || item.name}
            </td>
            <td style={{ padding: "10px 14px" }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", color: "#fff", fontSize: 11, fontWeight: 500 }}>{item.sku || "—"}</div>
              {item.specs && <div style={{ fontSize: 11, color: "#fff", marginTop: 2, fontWeight: 600 }}>{item.specs}</div>}
            </td>
            <td style={{ padding: "10px 14px" }}><Badge color="muted">{item.category}</Badge></td>
            <td style={{ padding: "10px 14px" }}>
              <Badge color={isLow ? (item.qty === 0 ? "red" : "amber") : "green"}>{item.qty}</Badge>
            </td>
            <td style={{ padding: "10px 14px", color: PALETTE.textMuted }}>{item.unit}</td>
            <td style={{ padding: "10px 14px", fontFamily: "'JetBrains Mono', monospace", color: PALETTE.textDim, fontSize: 11 }}>{item.location || "—"}</td>
            <td style={{ padding: "10px 14px", color: PALETTE.textMuted, fontSize: 11 }}>{item.supplier || "—"}</td>
            <td style={{ padding: "10px 14px", whiteSpace: "nowrap" }}>
              <button onClick={(e) => { e.stopPropagation(); startEdit(item); }} style={{ background: "none", border: "none", color: PALETTE.textDim, cursor: "pointer", padding: 4, marginRight: 4 }}><Icons.Edit /></button>
              <button onClick={(e) => { e.stopPropagation(); setDeletingItem(item); }} style={{ background: "none", border: "none", color: PALETTE.textDim, cursor: "pointer", padding: 4 }}><Icons.Trash /></button>
            </td>
          </tr>
        );
      });
    }

    return rows;
  }).flat();
}

// ─── INVENTORY PAGE ───
function InventoryPage({ inventory, deleteItem, updateItem }) {
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("All");
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [deletingItem, setDeletingItem] = useState(null);

  const filtered = inventory.filter((i) => {
    const s = search.toLowerCase();
    const matchSearch = !search || i.name.toLowerCase().includes(s) || i.sku.toLowerCase().includes(s) || (i.specs || "").toLowerCase().includes(s);
    const matchCat = catFilter === "All" || i.category === catFilter;
    return matchSearch && matchCat;
  });

  const startEdit = (item) => { setEditingId(item.id); setEditForm({ ...item }); };
  const saveEdit = () => { updateItem(editingId, editForm); setEditingId(null); };

  return (
    <div>
      <PageHeader title="Inventory" subtitle={`${inventory.length} items in stock`} />
      <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
        <div style={{ flex: 1, position: "relative" }}>
          <div style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: PALETTE.textDim }}><Icons.Search /></div>
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Search by name, SKU, or specs…"
            style={{ width: "100%", background: PALETTE.surface, border: `1px solid ${PALETTE.border}`, borderRadius: 8, padding: "9px 12px 9px 36px", color: PALETTE.text, fontSize: 13, outline: "none", fontFamily: "inherit" }}
          />
        </div>
        <Select value={catFilter} onChange={setCatFilter} options={["All", ...CATEGORIES]} small />
      </div>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${PALETTE.border}` }}>
                {["Item Name", "SKU / Specs", "Category", "Qty", "Unit", "Location", "Supplier", ""].map((h, i) => (
                  <th key={i} style={{ padding: "12px 14px", textAlign: "left", fontSize: 10, fontWeight: 600, color: PALETTE.textDim, textTransform: "uppercase", letterSpacing: "0.05em", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              <GroupedInventoryRows filtered={filtered} startEdit={startEdit} setDeletingItem={setDeletingItem} />
              {filtered.length === 0 && (
                <tr><td colSpan={8} style={{ padding: 40, textAlign: "center", color: PALETTE.textDim }}>No items found</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </Card>

      {/* EDIT MODAL */}
      {editingId !== null && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }} onClick={() => setEditingId(null)}>
          <Card style={{ width: 520, maxHeight: "80vh", overflow: "auto" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600 }}>Edit Item</h3>
              <button onClick={() => setEditingId(null)} style={{ background: "none", border: "none", color: PALETTE.textMuted, cursor: "pointer" }}><Icons.Close /></button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Item Name" value={editForm.name || ""} onChange={(v) => setEditForm({ ...editForm, name: v })} style={{ gridColumn: "1 / -1" }} />
              <Input label="SKU" value={editForm.sku || ""} onChange={(v) => setEditForm({ ...editForm, sku: v })} mono />
              <Input label="Specs" value={editForm.specs || ""} onChange={(v) => setEditForm({ ...editForm, specs: v })} placeholder="e.g. 30cm x 600m x 10mic" />
              <Select label="Category" value={editForm.category || ""} onChange={(v) => setEditForm({ ...editForm, category: v })} options={CATEGORIES} />
              <Input label="Quantity" type="number" value={editForm.qty ?? ""} onChange={(v) => setEditForm({ ...editForm, qty: Number(v) })} />
              <Select label="Unit" value={editForm.unit || "pcs"} onChange={(v) => setEditForm({ ...editForm, unit: v })} options={UNITS} />
              <Input label="Location" value={editForm.location || ""} onChange={(v) => setEditForm({ ...editForm, location: v })} mono />
              <Input label="Supplier" value={editForm.supplier || ""} onChange={(v) => setEditForm({ ...editForm, supplier: v })} style={{ gridColumn: "1 / -1" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
              <Btn variant="secondary" onClick={() => setEditingId(null)}>Cancel</Btn>
              <Btn onClick={saveEdit}><Icons.Check /> Save</Btn>
            </div>
          </Card>
        </div>
      )}

      {/* DELETE CONFIRMATION MODAL */}
      {deletingItem !== null && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }} onClick={() => setDeletingItem(null)}>
          <Card style={{ width: 420 }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600, color: PALETTE.red, display: "flex", alignItems: "center", gap: 8 }}>
                <Icons.Alert /> Confirm Deletion
              </h3>
              <button onClick={() => setDeletingItem(null)} style={{ background: "none", border: "none", color: PALETTE.textMuted, cursor: "pointer" }}><Icons.Close /></button>
            </div>
            <div style={{ padding: "16px", background: PALETTE.bg, borderRadius: 8, marginBottom: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>{deletingItem.name}</div>
              <div style={{ display: "flex", gap: 12, fontSize: 12, color: PALETTE.textMuted, flexWrap: "wrap" }}>
                <span style={{ fontFamily: "'JetBrains Mono', monospace" }}>{deletingItem.sku || "No SKU"}</span>
                {deletingItem.specs && <><span>·</span><span>{deletingItem.specs}</span></>}
                <span>·</span>
                <span>{deletingItem.qty} {deletingItem.unit} in stock</span>
                {deletingItem.location && <><span>·</span><span>{deletingItem.location}</span></>}
              </div>
            </div>
            <p style={{ fontSize: 13, color: PALETTE.textMuted, margin: "0 0 20px", lineHeight: 1.5 }}>
              This will permanently remove this item from your inventory. This action cannot be undone.
            </p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
              <Btn variant="secondary" onClick={() => setDeletingItem(null)}>Cancel</Btn>
              <Btn variant="danger" onClick={() => { deleteItem(deletingItem.id); setDeletingItem(null); }}><Icons.Trash /> Delete Item</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ─── STOCK IN PAGE (AI Upload + Manual) ───
const EMPTY_MANUAL_ITEM = { name: "", sku: "", specs: "", category: "Other", qty: 1, unit: "pcs", supplier: "", dateReceived: new Date().toISOString().split("T")[0], batchNo: "", expiry: "", poNumber: "", location: "", notes: "" };

function StockInPage({ addItems, apiKey, setShowSettings }) {
  const [mode, setMode] = useState("choose"); // choose | upload | extracting | review | manual | error | done
  const [fileName, setFileName] = useState("");
  const [extracted, setExtracted] = useState([]);
  const [manualItems, setManualItems] = useState([{ ...EMPTY_MANUAL_ITEM }]);
  const [extractError, setExtractError] = useState("");
  const fileRef = useRef();

  const handleFile = async (file) => {
    if (!file) return;
    if (!apiKey) {
      setExtractError("Anthropic API key is required for AI extraction. Click the Settings button at the bottom of the sidebar to add your key.");
      setMode("error");
      return;
    }
    setFileName(file.name);
    setMode("extracting");
    setExtractError("");
    try {
      const items = await extractWithAI(file, apiKey);
      if (items.length === 0) {
        setExtractError("AI could not find any extractable items in this document. Try a different file or use manual entry.");
        setMode("error");
        return;
      }
      setExtracted(items);
      setMode("review");
    } catch (err) {
      console.error("Extraction failed:", err);
      setExtractError(err.message || "An unknown error occurred during extraction.");
      setMode("error");
    }
  };

  const handleDrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

  const handleConfirm = () => {
    const toAdd = extracted.map((e) => ({
      name: e.name, sku: e.sku, specs: e.specs || "", category: e.category, qty: e.qty, unit: e.unit, supplier: e.supplier, location: e.location, batchNo: e.batchNo, expiry: e.expiry, notes: e.notes, dateReceived: e.dateReceived, poNumber: e.poNumber,
    }));
    addItems(toAdd);
    setMode("done");
  };

  const handleManualConfirm = () => {
    const valid = manualItems.filter((i) => i.name.trim() && i.qty > 0).map((i) => ({
      ...i, qty: Number(i.qty),
    }));
    if (valid.length === 0) return;
    addItems(valid);
    setMode("done");
  };

  const updateExtracted = (idx, field, value) => {
    setExtracted((prev) => prev.map((item, i) => i === idx ? { ...item, [field]: value } : item));
  };
  const removeExtracted = (idx) => {
    setExtracted((prev) => prev.filter((_, i) => i !== idx));
  };

  const updateManual = (idx, field, value) => {
    setManualItems((prev) => prev.map((item, i) => i === idx ? { ...item, [field]: value } : item));
  };
  const addManualLine = () => {
    setManualItems((prev) => [...prev, { ...EMPTY_MANUAL_ITEM }]);
  };
  const removeManualLine = (idx) => {
    setManualItems((prev) => prev.filter((_, i) => i !== idx));
  };

  const reset = () => { setMode("choose"); setFileName(""); setExtracted([]); setManualItems([{ ...EMPTY_MANUAL_ITEM }]); setExtractError(""); };

  const validManualCount = manualItems.filter((i) => i.name.trim() && i.qty > 0).length;

  return (
    <div>
      <PageHeader title="Stock In" subtitle="Add incoming inventory via AI upload or manual entry">
        {mode !== "choose" && <Btn variant="secondary" onClick={reset}>← Start Over</Btn>}
      </PageHeader>

      {/* MODE CHOOSER */}
      {mode === "choose" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div
            onClick={() => setMode("upload")}
            style={{ background: PALETTE.surface, border: `1px solid ${PALETTE.border}`, borderRadius: 12, padding: 20, cursor: "pointer", transition: "border-color 0.2s, transform 0.15s", position: "relative", overflow: "hidden" }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = PALETTE.accent; e.currentTarget.style.transform = "translateY(-2px)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = PALETTE.border; e.currentTarget.style.transform = "translateY(0)"; }}
          >
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${PALETTE.accent}, ${PALETTE.purple})` }} />
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, marginTop: 4 }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: PALETTE.accentSoft, display: "flex", alignItems: "center", justifyContent: "center", color: PALETTE.accent }}>
                <Icons.Sparkle />
              </div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 700 }}>AI Upload</div>
                <div style={{ fontSize: 11, color: PALETTE.textMuted }}>Recommended</div>
              </div>
            </div>

      {/* MANUAL ENTRY STAGE */}

              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1.5fr 1fr", gap: 10, marginBottom: 10 }}>

                <Input label="SKU / Item Code" value={item.sku} onChange={(v) => updateManual(idx, "sku", v)} small mono placeholder="e.g. VK-CF-30" />
                <Input label="Specs / Dimensions" value={item.specs} onChange={(v) => updateManual(idx, "specs", v)} small placeholder="e.g. 30cm x 600m x 10mic" />
                <Select label="Category" value={item.category} onChange={(v) => updateManual(idx, "category", v)} options={CATEGORIES} small />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                <Input label="Quantity *" type="number" value={item.qty} onChange={(v) => updateManual(idx, "qty", v)} small />
                <Select label="Unit" value={item.unit} onChange={(v) => updateManual(idx, "unit", v)} options={UNITS} small />

                <Input label="Supplier" value={item.supplier} onChange={(v) => updateManual(idx, "supplier", v)} small placeholder="e.g. EcoPack Thailand" />

              </div>
              <div style={{ marginTop: 10 }}>
                <Input label="Notes / Remarks" value={item.notes} onChange={(v) => updateManual(idx, "notes", v)} small placeholder="Any additional notes…" />

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>

              <Btn onClick={handleManualConfirm} disabled={validManualCount === 0} variant="green"><Icons.Check /> Add {validManualCount} Item{validManualCount !== 1 ? "s" : ""} to Inventory</Btn>
            </div>
          </div>

      {/* ERROR STAGE */}
      {mode === "error" && (
        <Card style={{ textAlign: "center", padding: "50px 40px" }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%", background: PALETTE.redSoft, border: `2px solid ${PALETTE.redBorder}`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16, color: PALETTE.red }}>

          </div>
          <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8, color: PALETTE.red }}>Extraction Failed</div>

            <Icons.File /> {fileName}

          <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
            <Btn variant="secondary" onClick={() => setMode("upload")}>Try Another File</Btn>
            <Btn variant="green" onClick={() => setMode("manual")}><Icons.Edit /> Switch to Manual Entry</Btn>

      {/* DONE STAGE */}
      {mode === "done" && (
        <Card style={{ textAlign: "center", padding: "60px 40px" }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%", background: PALETTE.greenSoft, border: `2px solid ${PALETTE.greenBorder}`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16, color: PALETTE.green }}>

          <Btn onClick={reset}>Add More Items</Btn>
        </Card>
      )}
    </div>
  );
}

// ─── STOCK OUT PAGE ───
function StockOutPage({ inventory, processStockOut }) {
  const [outItems, setOutItems] = useState([{ itemId: "", qty: 1, ref: "", party: "", notes: "" }]);
  const [done, setDone] = useState(false);
  const [stockErrors, setStockErrors] = useState([]);

  const addLine = () => setOutItems([...outItems, { itemId: "", qty: 1, ref: "", party: "", notes: "" }]);
  const removeLine = (idx) => setOutItems(outItems.filter((_, i) => i !== idx));

  const updateLine = (idx, field, value) => {
    setOutItems(outItems.map((item, i) => i === idx ? { ...item, [field]: value } : item));
  };

  const handleDispatch = () => {
    const valid = outItems.filter((o) => o.itemId && o.qty > 0).map((o) => {
      const inv = inventory.find((i) => i.id === Number(o.itemId));
      return { ...o, itemId: Number(o.itemId), itemName: inv?.name || "", sku: inv?.sku || "" };
    });
    if (valid.length === 0) return;
    const result = processStockOut(valid);
    if (result && !result.success) {
      setStockErrors(result.errors);
    } else {
      setDone(true);
    }
  };

  const reset = () => { setOutItems([{ itemId: "", qty: 1, ref: "", party: "", notes: "" }]); setDone(false); setStockErrors([]); };

  if (done) {
    return (
      <div>
        <PageHeader title="Stock Out" subtitle="Dispatch outgoing inventory" />
        <Card style={{ textAlign: "center", padding: "60px 40px" }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%", background: PALETTE.greenSoft, border: `2px solid ${PALETTE.greenBorder}`, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16, color: PALETTE.green }}>
            <Icons.Check />
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6, color: PALETTE.green }}>Stock Dispatched</div>
          <div style={{ fontSize: 13, color: PALETTE.textMuted, marginBottom: 20 }}>Inventory quantities have been updated</div>
          <Btn onClick={reset}>Process Another Dispatch</Btn>
        </Card>
      </div>
    );
  }

  const itemOptions = [{ value: "", label: "Select item…" }, ...inventory.map((i) => ({ value: String(i.id), label: `${i.name}${i.specs ? ` [${i.specs}]` : ""} (${i.qty} ${i.unit})` }))];

  return (
    <div>
      <PageHeader title="Stock Out" subtitle="Dispatch outgoing inventory">
        <Btn variant="secondary" onClick={addLine}><Icons.Plus /> Add Line</Btn>
      </PageHeader>

      {outItems.map((line, idx) => {
        const selected = line.itemId ? inventory.find((i) => i.id === Number(line.itemId)) : null;
        const overQty = selected && line.qty > selected.qty;
        return (
          <Card key={idx} style={{ marginBottom: 12, position: "relative", borderColor: overQty ? PALETTE.redBorder : PALETTE.border }}>
            {outItems.length > 1 && (
              <button onClick={() => removeLine(idx)} style={{ position: "absolute", top: 12, right: 12, background: "none", border: "none", color: PALETTE.textDim, cursor: "pointer" }}><Icons.Trash /></button>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 10, marginBottom: 10 }}>
              <Select label="Item" value={line.itemId} onChange={(v) => updateLine(idx, "itemId", v)} options={itemOptions} small />
              <Input label="Quantity" type="number" value={line.qty} onChange={(v) => updateLine(idx, "qty", Number(v))} small />
            </div>
            {selected && (
              <div style={{ fontSize: 11, color: overQty ? PALETTE.red : PALETTE.textDim, marginBottom: 10, fontFamily: "'JetBrains Mono', monospace" }}>
                Available: {selected.qty} {selected.unit} &nbsp;|&nbsp; SKU: {selected.sku}{selected.specs ? ` — ${selected.specs}` : ""} &nbsp;|&nbsp; Location: {selected.location || "—"}
                {overQty && <span style={{ marginLeft: 8, color: PALETTE.red, fontFamily: "'DM Sans', sans-serif", fontWeight: 600 }}>⚠ Exceeds available stock</span>}
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
              <Input label="Reference / Order #" value={line.ref} onChange={(v) => updateLine(idx, "ref", v)} small mono />
              <Input label="Customer / Destination" value={line.party} onChange={(v) => updateLine(idx, "party", v)} small />
              <Input label="Notes" value={line.notes} onChange={(v) => updateLine(idx, "notes", v)} small />
            </div>
          </Card>
        );
      })}

      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8 }}>
        <Btn variant="secondary" onClick={reset}>Clear</Btn>
        <Btn variant="danger" onClick={handleDispatch} disabled={!outItems.some((o) => o.itemId)}><Icons.StockOut /> Dispatch</Btn>
      </div>

      {/* INSUFFICIENT STOCK MODAL */}
      {stockErrors.length > 0 && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }} onClick={() => setStockErrors([])}>
          <Card style={{ width: 480, maxHeight: "70vh", overflow: "auto" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600, color: PALETTE.red, display: "flex", alignItems: "center", gap: 8 }}>
                <Icons.Alert /> Not Enough Items Available
              </h3>
              <button onClick={() => setStockErrors([])} style={{ background: "none", border: "none", color: PALETTE.textMuted, cursor: "pointer" }}><Icons.Close /></button>
            </div>
            <p style={{ fontSize: 13, color: PALETTE.textMuted, margin: "0 0 16px", lineHeight: 1.5 }}>
              The following items do not have enough stock to fulfill this dispatch. Please adjust the quantities and try again.
            </p>
            {stockErrors.map((err, i) => (
              <div key={i} style={{ padding: "12px 14px", background: PALETTE.bg, borderRadius: 8, marginBottom: 8, border: `1px solid ${PALETTE.redBorder}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{err.itemName}</div>
                <div style={{ display: "flex", gap: 16, fontSize: 12 }}>
                  <span style={{ color: PALETTE.textMuted }}>Requested: <strong style={{ color: PALETTE.red }}>{err.requested} {err.unit}</strong></span>
                  <span style={{ color: PALETTE.textMuted }}>Available: <strong style={{ color: PALETTE.amber }}>{err.available} {err.unit}</strong></span>
                  <span style={{ color: PALETTE.textMuted }}>Short: <strong style={{ color: PALETTE.red }}>{err.requested - err.available} {err.unit}</strong></span>
                </div>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
              <Btn variant="secondary" onClick={() => setStockErrors([])}>Close & Adjust Quantities</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ─── HISTORY PAGE ───
function HistoryPage({ movements }) {
  const [typeFilter, setTypeFilter] = useState("all");
  const [search, setSearch] = useState("");

  const filtered = movements.filter((m) => {
    const matchType = typeFilter === "all" || m.type === typeFilter;
    const matchSearch = !search || m.itemName.toLowerCase().includes(search.toLowerCase()) || m.sku.toLowerCase().includes(search.toLowerCase()) || (m.ref || "").toLowerCase().includes(search.toLowerCase());
    return matchType && matchSearch;
  });

  return (
    <div>
      <PageHeader title="Movement History" subtitle={`${movements.length} total records`} />
      <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
        <div style={{ flex: 1, position: "relative" }}>
          <div style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: PALETTE.textDim }}><Icons.Search /></div>
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Search by item, SKU, or reference…"
            style={{ width: "100%", background: PALETTE.surface, border: `1px solid ${PALETTE.border}`, borderRadius: 8, padding: "9px 12px 9px 36px", color: PALETTE.text, fontSize: 13, outline: "none", fontFamily: "inherit" }}
          />
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {[{ key: "all", label: "All" }, { key: "in", label: "Stock In" }, { key: "out", label: "Stock Out" }].map((f) => (
            <button
              key={f.key}
              onClick={() => setTypeFilter(f.key)}
              style={{
                padding: "8px 14px", borderRadius: 8, border: `1px solid ${typeFilter === f.key ? PALETTE.accent : PALETTE.border}`, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit",
                background: typeFilter === f.key ? PALETTE.accentSoft : "transparent",
                color: typeFilter === f.key ? PALETTE.accent : PALETTE.textMuted,
              }}
            >
              {f.label}
            </button>
          ))}
        </div>
      </div>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${PALETTE.border}` }}>
              {["Type", "Date", "Item", "SKU", "Qty", "Reference", "Party", "Notes"].map((h, i) => (
                <th key={i} style={{ padding: "12px 14px", textAlign: "left", fontSize: 10, fontWeight: 600, color: PALETTE.textDim, textTransform: "uppercase", letterSpacing: "0.05em", whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((m) => (
              <tr key={m.id} style={{ borderBottom: `1px solid ${PALETTE.border}` }}>
                <td style={{ padding: "10px 14px" }}>
                  <Badge color={m.type === "in" ? "green" : "red"}>{m.type === "in" ? "▼ IN" : "▲ OUT"}</Badge>
                </td>
                <td style={{ padding: "10px 14px", fontFamily: "'JetBrains Mono', monospace", color: PALETTE.textMuted, fontSize: 11 }}>{m.date}</td>
                <td style={{ padding: "10px 14px", fontWeight: 500 }}>{m.itemName}</td>
                <td style={{ padding: "10px 14px", fontFamily: "'JetBrains Mono', monospace", color: PALETTE.textDim, fontSize: 11 }}>{m.sku}</td>
                <td style={{ padding: "10px 14px", fontWeight: 600, color: m.type === "in" ? PALETTE.green : PALETTE.red, fontFamily: "'JetBrains Mono', monospace" }}>{m.type === "in" ? "+" : "-"}{m.qty}</td>
                <td style={{ padding: "10px 14px", fontFamily: "'JetBrains Mono', monospace", color: PALETTE.textMuted, fontSize: 11 }}>{m.ref || "—"}</td>
                <td style={{ padding: "10px 14px", color: PALETTE.textMuted }}>{m.party || "—"}</td>
                <td style={{ padding: "10px 14px", color: PALETTE.textDim, fontSize: 11 }}>{m.notes || "—"}</td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={8} style={{ padding: 40, textAlign: "center", color: PALETTE.textDim }}>No movements found</td></tr>
            )}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InventoryApp));
  </script>
</body>
</html>
